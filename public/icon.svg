<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <!-- Background Gradient (Dark Theme) -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1e2e" />
      <stop offset="100%" stop-color="#09090b" />
    </linearGradient>

    <!-- Glassmorphism Overlay -->
    <linearGradient id="glass-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="rgba(255, 255, 255, 0.15)" />
      <stop offset="100%" stop-color="rgba(255, 255, 255, 0.02)" />
    </linearGradient>

    <!-- Neon Glow Gradient for '>' -->
    <linearGradient id="neon-cyan" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00f2fe" />
      <stop offset="100%" stop-color="#4facfe" />
    </linearGradient>

    <!-- Neon Purple Gradient for '_' -->
    <linearGradient id="neon-purple" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#b06ab3" />
      <stop offset="100%" stop-color="#4568dc" />
    </linearGradient>

    <!-- Base Drop Shadow -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="25" stdDeviation="35" flood-color="#000" flood-opacity="0.6"/>
    </filter>

    <!-- Neon Glow Filter -->
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="30" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Main App Icon Squircle Base -->
  <rect x="64" y="64" width="896" height="896" rx="200" fill="url(#bg-gradient)" filter="url(#shadow)" />
  
  <!-- Subtle Grid Background -->
  <g opacity="0.1">
    <path d="M 64 288 L 960 288 M 64 512 L 960 512 M 64 736 L 960 736 M 288 64 L 288 960 M 512 64 L 512 960 M 736 64 L 736 960" stroke="#ffffff" stroke-width="4" />
  </g>

  <!-- Inner Glass Terminal Window -->
  <rect x="160" y="220" width="704" height="584" rx="60" fill="url(#glass-gradient)" stroke="rgba(255,255,255,0.15)" stroke-width="6" filter="url(#shadow)" />

  <!-- Terminal Window Controls (Red, Yellow, Green dots) -->
  <circle cx="230" cy="290" r="18" fill="#ff5f56" />
  <circle cx="290" cy="290" r="18" fill="#ffbd2e" />
  <circle cx="350" cy="290" r="18" fill="#27c93f" />

  <!-- Terminal Prompt Content -->
  <g filter="url(#glow)">
    <!-- The '>' Arrow -->
    <path d="M 280 430 L 440 520 L 280 610" fill="none" stroke="url(#neon-cyan)" stroke-width="56" stroke-linecap="round" stroke-linejoin="round" />
    
    <!-- The '_' Cursor -->
    <rect x="500" y="580" width="260" height="56" rx="28" fill="url(#neon-purple)" />
  </g>

